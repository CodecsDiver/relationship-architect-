  window.highlightCard = function(key) {
    document.querySelectorAll('.sa-card').forEach(c => c.classList.remove('sa-highlighted'));
    const card = document.getElementById('sa-card-' + key);
    if (!card) return;
    card.classList.add('sa-highlighted');
    const content = document.getElementById('content');
    if (content) content.scrollTop = card.offsetTop - 80;
    setTimeout(() => card.classList.remove('sa-highlighted'), 2200);
    const popup = document.getElementById('constellation-popup');
    if (popup) popup.style.display = 'none';
  };

  /* ── Sound Engine ── */
  let _audioCtx = null, _masterGain = null;

  function getAudio() {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      _masterGain = _audioCtx.createGain();
      _masterGain.gain.value = 0.55;
      const revLen = _audioCtx.sampleRate * 1.2;
      const revBuf = _audioCtx.createBuffer(2, revLen, _audioCtx.sampleRate);
      for (let ch = 0; ch < 2; ch++) { const d = revBuf.getChannelData(ch); for (let i = 0; i < revLen; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/revLen,2.5); }
      const rev = _audioCtx.createConvolver(); rev.buffer = revBuf;
      const revG = _audioCtx.createGain(); revG.gain.value = 0.28;
      rev.connect(revG); revG.connect(_masterGain);
      _masterGain._rev = rev;
      _masterGain.connect(_audioCtx.destination);
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return { ctx: _audioCtx, master: _masterGain };
  }

  function playTone(freq, dur, vol, type, delay) {
    const { ctx, master } = getAudio();
    const t = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator(), env = ctx.createGain();
    osc.type = type || 'sine'; osc.frequency.value = freq;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(vol, t + 0.018);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(env); env.connect(master);
    if (master._rev) env.connect(master._rev);
    osc.start(t); osc.stop(t + dur + 0.05);
  }

  const SFX = {
    tabSwitch()  { playTone(440,0.18,0.12,'sine'); playTone(554,0.22,0.09,'sine',0.06); },
    save()       { playTone(523,0.15,0.12,'sine'); playTone(659,0.3,0.10,'sine',0.08); playTone(784,0.5,0.08,'sine',0.18); },
    editOn()     { playTone(330,0.08,0.10,'sine'); playTone(440,0.15,0.10,'sine',0.04); },
    editOff()    { playTone(440,0.08,0.10,'sine'); playTone(330,0.18,0.09,'sine',0.04); },
    fileCreate() { playTone(523,0.35,0.09,'sine'); playTone(659,0.35,0.09,'sine',0.08); playTone(784,0.5,0.09,'sine',0.16); },
    deleteDo()   { playTone(220,0.35,0.10,'sine'); playTone(165,0.5,0.08,'sine',0.12); },
    complete()   { [523,659,784,1047].forEach((f,i) => playTone(f,0.55,0.10,'sine',i*0.11)); },
    orbClick(idx) {
      // C major scale across 2 octaves, one note per orb
      const ORB_NOTES = [261.63,293.66,329.63,349.23,392.00,440.00,493.88,523.25,587.33,659.25,698.46,783.99];
      const root = ORB_NOTES[((idx||0) % ORB_NOTES.length)];
      const { ctx, master } = getAudio();
      // Whoosh: filtered noise sweep
      const bufLen = ctx.sampleRate * 0.6;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter(); filt.type = 'bandpass';
      filt.frequency.setValueAtTime(200, ctx.currentTime);
      filt.frequency.exponentialRampToValueAtTime(3200, ctx.currentTime + 0.4);
      filt.Q.value = 2.5;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0, ctx.currentTime);
      noiseGain.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 0.05);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.55);
      noise.connect(filt); filt.connect(noiseGain); noiseGain.connect(master);
      if (master._rev) noiseGain.connect(master._rev);
      noise.start(); noise.stop(ctx.currentTime + 0.65);
      // Rising harmonic series rooted at orb's note
      playTone(root,      0.5,  0.18, 'sawtooth');
      playTone(root*2,    0.45, 0.14, 'sine', 0.06);
      playTone(root*4,    0.4,  0.10, 'sine', 0.14);
      playTone(root*8,    0.35, 0.07, 'sine', 0.24);
      // Shimmer: major triad above root
      [root*3, root*3.75, root*4.5].forEach((f, i) => playTone(f, 0.4, 0.06, 'sine', 0.3 + i * 0.06));
    },
    orbClose() {
      const { ctx, master } = getAudio();
      // Reverse whoosh: high → low noise
      const bufLen = ctx.sampleRate * 0.45;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const filt = ctx.createBiquadFilter(); filt.type = 'bandpass';
      filt.frequency.setValueAtTime(3000, ctx.currentTime);
      filt.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.4);
      filt.Q.value = 2;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.4, ctx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.42);
      noise.connect(filt); filt.connect(noiseGain); noiseGain.connect(master);
      noise.start(); noise.stop(ctx.currentTime + 0.5);
      // Falling tones
      playTone(1760, 0.08, 0.1, 'sine');
      playTone(880, 0.2, 0.09, 'sine', 0.07);
      playTone(440, 0.3, 0.08, 'sine', 0.16);
      playTone(220, 0.4, 0.07, 'sine', 0.26);
    },
    click()      { playTone(600,0.07,0.07,'sine'); },
    modalOpen()  { playTone(370,0.12,0.09,'sine'); playTone(494,0.22,0.08,'sine',0.07); },
    export()     { playTone(440,0.1,0.08,'triangle'); playTone(554,0.1,0.08,'triangle',0.08); playTone(659,0.3,0.07,'triangle',0.16); },
    themeSwitch(){
      const { ctx, master } = getAudio();
      // Colour-sweep: short filtered noise burst
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.25, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const noise = ctx.createBufferSource(); noise.buffer = buf;
      const bpf = ctx.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.setValueAtTime(800, ctx.currentTime); bpf.frequency.linearRampToValueAtTime(3200, ctx.currentTime + 0.22); bpf.Q.value = 1.2;
      const ng = ctx.createGain(); ng.gain.setValueAtTime(0.12, ctx.currentTime); ng.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.22);
      noise.connect(bpf); bpf.connect(ng); ng.connect(master);
      noise.start(); noise.stop(ctx.currentTime + 0.25);
      // Rising 3-note arpeggio
      [523, 659, 784].forEach((f, i) => playTone(f, 0.35 - i*0.05, 0.10 - i*0.02, 'sine', i * 0.07));
      // Final shimmer
      playTone(1047, 0.4, 0.06, 'sine', 0.24);
    }
  };
  window.SFX = SFX;

  window.openMeetingNotesPanel = function() {
    let panel = document.getElementById('mn-panel');
    if (panel) { panel.style.display = panel.style.display === 'none' ? 'flex' : 'none'; return; }
    panel = document.createElement('div');
    panel.id = 'mn-panel';
    panel.style.cssText = 'position:fixed;right:24px;bottom:24px;width:480px;height:560px;background:var(--bg-panel);border:1px solid var(--border);border-radius:14px;box-shadow:0 40px 100px rgba(0,0,0,0.7);display:flex;flex-direction:column;z-index:600;overflow:hidden;';
    // Title bar — draggable
    const titleBar = document.createElement('div');
    titleBar.style.cssText = 'display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015);flex-shrink:0;cursor:move;user-select:none;';
    titleBar.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--text);flex:1;">Meeting Notes</span>
      <button onclick="document.getElementById('mn-panel').style.display='none'" style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;line-height:1;">✕</button>`;
    // Drag logic
    let dragging=false, ox=0, oy=0;
    titleBar.onmousedown = e => { dragging=true; ox=e.clientX-panel.offsetLeft; oy=e.clientY-panel.offsetTop; panel.style.right='auto'; };
    document.onmousemove = e => { if(!dragging) return; panel.style.left=(e.clientX-ox)+'px'; panel.style.top=(e.clientY-oy)+'px'; };
    document.onmouseup = () => { dragging=false; };
    panel.appendChild(titleBar);
    // Body
    const body = document.createElement('div');
    body.style.cssText = 'flex:1;overflow-y:auto;padding:14px;';
    // Add entry button
    const addBtn = document.createElement('div');
    addBtn.className = 'mn-add-btn';
    addBtn.innerHTML = '<span style="font-size:16px;">+</span> New Entry';
    body.appendChild(addBtn);
    // Load and render notes
    const mnData = sectionData['meeting_notes'] || { fields: {} };
    let notes = [];
    try { notes = JSON.parse((mnData.fields && mnData.fields['mn_entries']) || '[]'); } catch(e) {}
    const renderPanelNotes = () => {
      body.querySelectorAll('.mn-entry').forEach(el => el.remove());
      notes.forEach((note, i) => {
        const entry = document.createElement('div');
        entry.className = 'mn-entry';
        entry.style.marginBottom = '10px';
        const hdr = document.createElement('div');
        hdr.style.cssText = 'display:flex;gap:6px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01);';
        const dateI = document.createElement('input'); dateI.type='date'; dateI.value=note.date||''; dateI.style.cssText='background:transparent;border:none;outline:none;color:var(--text);font-family:"JetBrains Mono",monospace;font-size:10px;'; dateI.oninput=e=>{notes[i].date=e.target.value;};
        const weekI = document.createElement('input'); weekI.type='text'; weekI.placeholder='Week #'; weekI.value=note.week||''; weekI.style.cssText='background:transparent;border:none;outline:none;color:var(--text);font-family:"JetBrains Mono",monospace;font-size:10px;width:60px;'; weekI.oninput=e=>{notes[i].week=e.target.value;};
        const topicI = document.createElement('input'); topicI.type='text'; topicI.placeholder='Topics…'; topicI.value=note.topics||''; topicI.style.cssText='flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:"Cormorant Garamond",serif;font-size:12px;'; topicI.oninput=e=>{notes[i].topics=e.target.value;};
        const delB = document.createElement('span'); delB.textContent='✕'; delB.style.cssText='cursor:pointer;color:rgba(212,132,122,0.4);font-size:12px;'; delB.onclick=()=>{notes.splice(i,1);renderPanelNotes();};
        hdr.appendChild(dateI); hdr.appendChild(weekI); hdr.appendChild(topicI); hdr.appendChild(delB);
        const notesTA = document.createElement('textarea'); notesTA.placeholder='Notes…'; notesTA.value=note.notes||''; notesTA.style.cssText='width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;color:var(--text);font-family:"Cormorant Garamond",serif;font-size:13px;line-height:1.7;padding:8px 10px;resize:none;min-height:70px;box-sizing:border-box;'; notesTA.oninput=e=>{notes[i].notes=e.target.value;};
        const actTA = document.createElement('textarea'); actTA.placeholder='Action items…'; actTA.value=note.actions||''; actTA.style.cssText='width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:"Cormorant Garamond",serif;font-size:13px;line-height:1.7;padding:8px 10px;resize:none;min-height:50px;box-sizing:border-box;'; actTA.oninput=e=>{notes[i].actions=e.target.value;};
        const actLabel = document.createElement('div'); actLabel.style.cssText='font-family:"JetBrains Mono",monospace;font-size:7.5px;color:var(--gold);letter-spacing:0.8px;padding:5px 10px 0;text-transform:uppercase;'; actLabel.textContent='Action Items';
        entry.appendChild(hdr); entry.appendChild(notesTA); entry.appendChild(actLabel); entry.appendChild(actTA);
        body.insertBefore(entry, addBtn);
      });
    };
    addBtn.onclick = () => {
      notes.unshift({ date: new Date().toISOString().slice(0,10), week: String(notes.length+1), topics:'', notes:'', actions:'' });
      renderPanelNotes();
    };
    renderPanelNotes();
    // Footer: Save
    const footer = document.createElement('div');
    footer.style.cssText = 'padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;';
    const saveBtn = document.createElement('button');
    saveBtn.style.cssText = 'font-family:"JetBrains Mono",monospace;font-size:10px;padding:8px 16px;border-radius:7px;border:1px solid rgba(201,164,81,0.35);background:transparent;color:var(--gold);cursor:pointer;';
    saveBtn.textContent = 'Save Notes';
    saveBtn.onclick = () => {
      const merged = { ...sectionData['meeting_notes'], fields: { mn_entries: JSON.stringify(notes) }, lastEditedAt: new Date().toISOString() };
      try { localStorage.setItem('dv_sec_meeting_notes', JSON.stringify(merged)); } catch(e) {}
      sectionData['meeting_notes'] = merged;
      SFX.save(); showToast('✓ Meeting notes saved');
    };
    footer.appendChild(saveBtn);
    panel.appendChild(body);
    panel.appendChild(footer);
    document.body.appendChild(panel);
  };

  window.goHome = function() { SFX.tabSwitch(); currentView = "home"; renderNav(); renderContent(); };

  /* ══════════════════════════════════════════
     INIT
  ══════════════════════════════════════════ */
  // Load section data from localStorage (offline fallback)
  function loadFromLocal() {
    SECTIONS.forEach(sec => {
      try {
        const raw = localStorage.getItem("dv_sec_" + sec.id);
        if (raw) { sectionData[sec.id] = JSON.parse(raw); return; }
      } catch(e) {}
      const fieldsObj = {};
      (sec.fields || []).forEach(f => fieldsObj[f.key] = "");
      sectionData[sec.id] = { fields: fieldsObj, completed: false };
    });
  }

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      if (btn) { SFX.save(); btn.click(); }
    }
  });

  function init() {
    // Restore theme immediately
    try {
      const saved = localStorage.getItem("dv_theme") || "midnight";
      applyTheme(saved);
    } catch(e) { applyTheme("midnight"); }

    // Restore custom sections
    try {
      const cs = JSON.parse(localStorage.getItem("dv_custom_sections") || "[]");
      customSections = cs;
    } catch(e) {}

    // Always load from local first so the app renders immediately
    loadFromLocal();
    currentView = "home";
    renderNav();
    renderContent();
    document.getElementById("loading-screen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    document.getElementById("status-badge").textContent = "● local";
  }

  init();
</script>

<script>
(function() {
  var widget = null, isPlaying = false, hasStarted = false, mpVisible = true;

  function setPlayIcon(playing) {
    isPlaying = playing;
    var el = document.getElementById('mp-play-icon');
    el.innerHTML = playing
      ? '<rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }

  function onFirstInteraction() {
    if (hasStarted || !widget) return;
    hasStarted = true;
    widget.play();
    document.removeEventListener('click', onFirstInteraction, true);
    document.removeEventListener('keydown', onFirstInteraction, true);
    document.removeEventListener('touchstart', onFirstInteraction, true);
  }

  window.scPlayPause = function() {
    if (!widget) return;
    if (!hasStarted) { onFirstInteraction(); return; }
    widget.isPaused(function(p) { p ? widget.play() : widget.pause(); });
  };
  window.scNext = function() { if (widget) widget.next(); };
  window.scPrev = function() { if (widget) widget.prev(); };
  window.toggleMP = function() {
    mpVisible = !mpVisible;
    var info = document.getElementById('mp-info');
    if (info) info.style.display = mpVisible ? '' : 'none';
  };

  function tryInit() {
    if (typeof SC === 'undefined') { setTimeout(tryInit, 300); return; }
    widget = SC.Widget(document.getElementById('sc-iframe'));
    widget.bind(SC.Widget.Events.READY, function() {
      widget.getCurrentSound(function(s) {
        if (s && s.title) document.getElementById('mp-track').textContent = s.title;
      });
      document.addEventListener('click', onFirstInteraction, true);
      document.addEventListener('keydown', onFirstInteraction, true);
      document.addEventListener('touchstart', onFirstInteraction, true);
    });
    widget.bind(SC.Widget.Events.PLAY, function() {
      setPlayIcon(true);
      widget.getCurrentSound(function(s) {
        if (s && s.title) document.getElementById('mp-track').textContent = s.title;
      });
    });
    widget.bind(SC.Widget.Events.PAUSE, function() { setPlayIcon(false); });
    widget.bind(SC.Widget.Events.PLAY_PROGRESS, function(e) {
      var pct = e.relativePosition != null ? e.relativePosition * 100 : (e.currentPosition && e.duration ? (e.currentPosition / e.duration) * 100 : null);
      if (pct != null) document.getElementById('mp-progress').style.width = pct + '%';
    });
    widget.bind(SC.Widget.Events.FINISH, function() {
      setPlayIcon(false);
      document.getElementById('mp-progress').style.width = '0%';
    });
  }

  tryInit();
})();
</script>
